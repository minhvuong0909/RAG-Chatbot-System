services:
  db:
    image: ankane/pgvector:latest
    container_name: rag-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: RagChatbotSystemDb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-api:
    build:
      context: ./RAG-Retrieval-Indexing-API
      dockerfile: Dockerfile
    container_name: rag-retrieval-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - rag-cache:/app/cache

  web-app:
    build:
      context: .
      dockerfile: RagChatbotSystem.Presentation/Dockerfile
    container_name: rag-web-app
    restart: always
    ports:
      - "5259:5259"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=RagChatbotSystemDb;Username=postgres;Password=${DB_PASSWORD:?DB_PASSWORD is required}
      - RagApi__BaseUrl=http://rag-api:8000
      - GoogleDrive__CredentialJsonPath=/app/google-credentials.json
      - GoogleDrive__TargetFolderId=${GOOGLE_DRIVE_FOLDER_ID:-}
      - Groq__ApiKey=${GROQ_API_KEY:-}
      - OpenAi__ApiKey=${OPENAI_API_KEY:-}
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID:-}
      - PAYOS_API_KEY=${PAYOS_API_KEY:-}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY:-}
      - PAYOS_PUBLIC_BASE_URL=${PAYOS_PUBLIC_BASE_URL:-}
      - Smtp__Host=${SMTP_HOST:-smtp.gmail.com}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL:-}
      - Smtp__FromName=${SMTP_FROM_NAME:-RAG Chatbot System}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./google-credentials.json:/app/google-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
      rag-api:
        condition: service_started

volumes:
  pgdata:
  rag-cache:
