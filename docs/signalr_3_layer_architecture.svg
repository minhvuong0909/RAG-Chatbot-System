      .line { stroke: #111827; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #111827; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrowDash); }
